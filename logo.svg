<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle (optional) -->
  <circle cx="60" cy="60" r="50" fill="url(#yellowGrad)" />

  <!-- QR code abstract icon -->
  <!-- Top-left square -->
  <rect x="35" y="35" width="12" height="12" fill="black" />
  <!-- Top-right square -->
  <rect x="72" y="35" width="12" height="12" fill="black" />
  <!-- Bottom-left square -->
  <rect x="35" y="72" width="12" height="12" fill="black" />
  <!-- Bottom-right square -->
  <rect x="60" y="60" width="12" height="12" fill="black" />
  <!-- Dot pattern inside -->
  <rect x="50" y="50" width="4" height="4" fill="black" />
  <rect x="58" y="45" width="4" height="4" fill="black" />
  <rect x="45" y="58" width="4" height="4" fill="black" />

  <!-- Lightning bolt (speed) inside the circle -->
  <polygon points="55,20 48,50 58,50 52,75 68,45 58,45 65,20" fill="black" />

  <!-- Wordmark: "Quick" -->
  <text x="130" y="50" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="32" fill="black">Quick</text>
  <!-- Wordmark: "2 Pay" -->
  <text x="130" y="85" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="24" fill="#555555">2 Pay</text>

  <!-- Tagline (small) -->
  <text x="130" y="105" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="11" fill="#999999">no app • scan & pay • instant</text>
</svg>